services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    extra_hosts:
      hostmachine: host-gateway
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://hostmachine:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    networks:
      - sonarnet
    volumes:
      - sonarqube_data:/home/blackserperior6/Универ/Третий курс/Кравец/SonarCube/data
      - sonarqube_extensions:/home/blackserperior6/Универ/Третий курс/Кравец/SonarCube/extensions
      - sonarqube_logs:/home/blackserperior6/Универ/Третий курс/Кравец/SonarCube/logs

networks:
  sonarnet:
    driver: bridge

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: