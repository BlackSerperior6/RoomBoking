stages:
  - build
  - test
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/roomBooking:$CI_COMMIT_SHORT_SHA
  CONTAINER_NAME: roomBooking-container
  DOCKER_HOST: unix:///var/run/docker.sock

# Кэширование папок с зависимостями для ускорения сборки
cache:
  paths:
    - ~/.nuget/packages/

# Этап сборки
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet restore
    - dotnet build --configuration Release --no-restore
    - dotnet publish --configuration Release --output ./publish --no-build
  artifacts:
    paths:
      - ./publish
    expire_in: 2 hour

# Этап тестирования (опционально)
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet test --configuration Release --no-build --verbosity normal
  dependencies:
    - build
  only:
    - merge_requests
    - master
    - develop

# Этап деплоя
deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: roomBooking:latest
  before_script:
    - docker version
    - apk add --no-cache docker-compose
  script:
    # Сборка через docker-compose
    - docker-compose build
    
    # Остановка старых контейнеров
    - docker-compose down || true

    #Получение пароля от дб из гитлаба
    - export DP_LIB_PASSWORD=$DP_LIB_PASSWORD

    # Запуск новых контейнеров
    - docker-compose up -d
    
    # Очистка
    - docker system prune -f
  only:
    - master