stages:
  - build
  - test
  - prodmigrations
  - devmigrations
  - testmigrations
  - deploy
  - documentation

variables:
  IMAGE_NAME: roombooking:latest
  CONTAINER_NAME: roombooking-container
  DOCKER_HOST: unix:///var/run/docker.sock
  DB_URL: "jdbc:postgresql://your-db-host:5432/your-database"
  FLYWAY_VERSION: 12.3.0

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore
    - dotnet build --configuration Release --no-restore

    - cd RoomBooking/

    - dotnet publish --configuration Release --output ./publish --no-build

    - cd ../
  artifacts:
    paths:
      - RoomBooking.Tests/bin/Release
      - RoomBooking/publish
    expire_in: 2 hour
  only:
    - master

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  before_script:
    - if [ -z "$DP_LIB_PASSWORD" ]; then echo "DP_LIB_PASSWORD is not set"; exit 1; fi
  script:
    - dotnet test RoomBooking.Tests/bin/Release/net10.0/RoomBooking.Tests.dll --no-build
  dependencies:
    - build
  only:
    - master

prodmigrations:
  stage: prodmigrations
  image: flyway/flyway:${FLYWAY_VERSION}
  script:
      - flyway -url="jdbc:postgresql://localhost:5432/RoomBooking" -user="Booker" -password="$DP_LIB_PASSWORD" -schemas="prod" -table="prod_schema_history" -locations="filesystem:./Migrations/Prod" migrate
  only:
    - master

devmigrations:
  stage: devmigrations
  image: flyway/flyway:${FLYWAY_VERSION}-alpine
  script:
      - flyway \
        -url=jdbc:postgresql://localhost:5432/RoomBooking \
        -user=Booker \
        -password=$DP_LIB_PASSWORD \
        -schemas=dev\
        -table=dev_schema_history \
        -locations=filesystem:./Migrations/Dev \
        migrate
  only:
    - Dev

testmigrations:
  stage: testmigrations
  image: flyway/flyway:${FLYWAY_VERSION}-alpine
  script:
      - flyway \
        -url=jdbc:postgresql://localhost:5432/RoomBooking \
        -user=Booker \
        -password=$DP_LIB_PASSWORD \
        -schemas=test\
        -table=test_schema_history \
        -locations=filesystem:./Migrations/Test \
        migrate
  only:
    - Test

deploy:
  stage: deploy
  image: docker:latest
  before_script:
    - docker version
    - docker info
  script:
    - cd RoomBooking/

    - docker-compose build

    - docker-compose down --remove-orphans || true

    - docker network prune -f

    - export DP_LIB_PASSWORD=$DP_LIB_PASSWORD

    - docker-compose up -d

    - docker system prune -f
  dependencies:
    - build
  only:
    - master

documentation:
  stage: documentation
  image: docker:latest
  before_script:
    - docker version
    - docker info
    - apk add dotnet10-sdk
    - dotnet --version
  script:
    - dotnet tool restore

    - dotnet docfx RoomBooking/docfx.json
    
    - mv RoomBooking/_site/ DocfxContainer/_site

    - cd ./DocfxContainer

    - docker-compose build
    
    - docker-compose down --remove-orphans || true

    - docker network prune -f

    - docker-compose up -d

    - docker system prune -f
  artifacts:
    paths:
      - DocfxContainer/_site
    expire_in: 2 hour
  only:
    - tags