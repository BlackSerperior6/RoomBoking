version: '3.8'

services:
  web:
    image: ${IMAGE_NAME:-roombooking:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-roombooking-container}
    restart: always
    ports:
      - "8083:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DP_LIB_PASSWORD=${DP_LIB_PASSWORD}